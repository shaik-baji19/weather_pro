name: weather

description: A dynamic weather application using OpenWeather API.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # API
  http: ^1.2.1

  # Location
  geolocator: ^11.0.0
  fl_chart: ^0.68.0
  
  # Date Formatting
  intl: ^0.19.0

  # Environment Variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env